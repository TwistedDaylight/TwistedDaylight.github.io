const STORAGE_KEY = "homehq-v2";
const CHORE_MAP   = Object.fromEntries(CHORES.map(c => [c.id, c]));

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { completed: {} };
}

function App() {
  const [state,         setState]         = useState(loadState);
  const [filter,        setFilter]        = useState("all");
  const [expandedTiers, setExpandedTiers] = useState({ 1:true, 2:true, 3:true });
  const [search,        setSearch]        = useState("");
  const [confetti,      setConfetti]      = useState(false);
  const [highlight,     setHighlight]     = useState(null);
  const rowRefs = useRef({});

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }, [state]);

  const jumpToChore = (id) => {
    const chore = CHORE_MAP[id];
    if (!chore) return;
    setExpandedTiers(s => ({ ...s, [chore.tier]: true }));
    setFilter("all");
    setSearch("");
    setHighlight(id);
    setTimeout(() => {
      const el = rowRefs.current[id];
      if (el) el.scrollIntoView({ behavior:"smooth", block:"center" });
    }, 80);
    setTimeout(() => setHighlight(null), 2200);
  };

  const toggle = (id) => {
    const wasDone = !!state.completed[id];
    setState(s => {
      const updated = { ...s.completed };
      if (updated[id]) { delete updated[id]; }
      else {
        updated[id] = new Date().toISOString();
        if (!wasDone) { setConfetti(true); setTimeout(() => setConfetti(false), 900); }
      }
      return { ...s, completed: updated };
    });
  };

  const resetAll = () => {
    if (window.confirm("Reset all checkmarks for a fresh day?")) {
      setState({ completed: {} });
    }
  };

  const tiers          = [...new Set(CHORES.map(c => c.tier))];
  const filteredChores = CHORES.filter(c => {
    if (filter === "done" && !state.completed[c.id]) return false;
    if (filter === "todo" && state.completed[c.id])  return false;
    if (search) {
      const q = search.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const completedCount = Object.keys(state.completed).length;
  const pct            = Math.round((completedCount / CHORES.length) * 100);
  const nextChore      = CHORES.find(c => !state.completed[c.id]);
  const toggleTier     = t => setExpandedTiers(s => ({ ...s, [t]: !s[t] }));

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)", fontFamily:"Georgia,'Times New Roman',serif", color:"#f0ede8" }}>

      {confetti && (
        <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ fontSize:72, color:"#f39c12", animation:"pop 0.9s ease-out forwards" }}>✓</div>
        </div>
      )}

      {/* HEADER */}
      <div style={{ padding:"28px 20px 20px", maxWidth:760, margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ fontSize:10, letterSpacing:4, textTransform:"uppercase", color:"#a89f94", marginBottom:5 }}>Household Priority List</div>
            <h1 style={{ margin:0, fontSize:34, fontWeight:"normal", letterSpacing:"-1px", color:"#f5ede0", lineHeight:1 }}>Home HQ</h1>
            <div style={{ marginTop:5, fontSize:12, color:"#8a9bb5" }}>
              {new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}
            </div>
          </div>
          <button onClick={resetAll} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", color:"#a89f94", padding:"8px 16px", borderRadius:6, cursor:"pointer", fontSize:12, letterSpacing:1, marginTop:4 }}>
            Reset Day
          </button>
        </div>

        {/* PROGRESS */}
        <div style={{ marginTop:22, background:"rgba(255,255,255,0.07)", borderRadius:12, padding:"15px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
            <span style={{ fontSize:12, color:"#c4bdb5" }}>Overall Progress</span>
            <span style={{ fontSize:20, fontWeight:"bold", color:"#f5ede0" }}>{completedCount}<span style={{ fontSize:12, color:"#8a9bb5", fontWeight:"normal" }}>/{CHORES.length}</span></span>
          </div>
          <div style={{ background:"rgba(255,255,255,0.1)", borderRadius:99, height:8, overflow:"hidden" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:"linear-gradient(90deg,#e67e22,#f39c12)", borderRadius:99, transition:"width 0.4s ease" }} />
          </div>
          <div style={{ marginTop:6, fontSize:11, color:"#8a9bb5" }}>{pct}% complete</div>
        </div>

        {/* NEXT PRIORITY */}
        {nextChore && filter !== "done" && (
          <div style={{ marginTop:13, background:"linear-gradient(135deg,rgba(230,126,34,0.2),rgba(243,156,18,0.1))", border:"1px solid rgba(230,126,34,0.35)", borderRadius:10, padding:"12px 16px", animation:"slideIn 0.3s ease" }}>
            <div style={{ fontSize:9, letterSpacing:3, textTransform:"uppercase", color:"#e67e22", marginBottom:3 }}>Next Priority</div>
            <div style={{ fontSize:15, color:"#f5ede0" }}>{nextChore.name}</div>
            <div style={{ fontSize:11, color:"#a89f94", marginTop:2 }}>{nextChore.desc}</div>
          </div>
        )}

        {/* FILTERS + SEARCH */}
        <div style={{ marginTop:16, display:"flex", gap:7, flexWrap:"wrap", alignItems:"center" }}>
          {["all","todo","done"].map(f => (
            <button key={f} className="filter-btn" onClick={() => setFilter(f)} style={{
              padding:"6px 15px", borderRadius:99, border:"1px solid",
              borderColor: filter===f ? "#e67e22" : "rgba(255,255,255,0.12)",
              background:  filter===f ? "rgba(230,126,34,0.2)" : "rgba(255,255,255,0.04)",
              color:       filter===f ? "#f5ede0" : "#8a9bb5",
              fontSize:12,
            }}>{f==="todo"?"To Do":f==="done"?"Done":"All"}</button>
          ))}
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search chores..."
            style={{ marginLeft:"auto", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:99, padding:"6px 14px", color:"#f0ede8", fontSize:12, outline:"none", width:148 }}
          />
        </div>
      </div>

      {/* CHORE LIST */}
      <div style={{ maxWidth:760, margin:"0 auto", padding:"0 20px 60px" }}>
        {tiers.map(tier => {
          const tierChores = filteredChores.filter(c => c.tier === tier);
          if (!tierChores.length) return null;
          const label    = CHORES.find(c => c.tier === tier).tierLabel;
          const col      = TIER_COLORS[tier];
          const tierDone = tierChores.filter(c => state.completed[c.id]).length;
          const isOpen   = expandedTiers[tier] !== false;

          return (
            <div key={tier} style={{ marginBottom:13 }}>
              <button onClick={() => toggleTier(tier)} style={{
                width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
                background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)",
                borderRadius: isOpen ? "10px 10px 0 0" : 10, padding:"11px 16px",
                cursor:"pointer", color:"#f0ede8", textAlign:"left",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                  <span style={{ background:col.badge, color:"#fff", borderRadius:5, fontSize:9, fontWeight:"bold", padding:"2px 7px", letterSpacing:1, fontFamily:"monospace" }}>P{tier}</span>
                  <span style={{ fontSize:13 }}>{label}</span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                  <span style={{ fontSize:11, color:"#8a9bb5" }}>{tierDone}/{tierChores.length}</span>
                  <span style={{ color:"#8a9bb5", fontSize:17 }}>{isOpen ? "-" : "+"}</span>
                </div>
              </button>

              {isOpen && (
                <div style={{ border:"1px solid rgba(255,255,255,0.09)", borderTop:"none", borderRadius:"0 0 10px 10px", overflow:"hidden" }}>
                  {tierChores.map((chore, i) => {
                    const done = !!state.completed[chore.id];
                    const lit  = highlight === chore.id;
                    return (
                      <div
                        key={chore.id}
                        ref={el => rowRefs.current[chore.id] = el}
                        style={{
                          borderTop: i > 0 ? "1px solid rgba(255,255,255,0.05)" : "none",
                          background: lit ? "rgba(230,126,34,0.13)" : done ? "rgba(255,255,255,0.02)" : "transparent",
                          outline: lit ? "1px solid rgba(230,126,34,0.45)" : "none",
                          transition: "background 0.35s, outline 0.35s",
                        }}
                      >
                        {/* Tap row to tick */}
                        <div
                          className="chore-row"
                          onClick={() => toggle(chore.id)}
                          style={{ display:"flex", alignItems:"flex-start", gap:13, padding:"13px 16px", paddingBottom: chore.chain ? "8px" : "13px" }}
                        >
                          <div style={{
                            flexShrink:0, width:21, height:21, borderRadius:6, marginTop:1,
                            border:`2px solid ${done ? col.badge : "rgba(255,255,255,0.2)"}`,
                            background: done ? col.badge : "transparent",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            transition:"all 0.15s",
                          }}>
                            {done && <span style={{ color:"#fff", fontSize:12 }}>&#10003;</span>}
                          </div>

                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                              <span style={{ fontSize:13, color: done?"#6b7a8d":"#f0ede8", textDecoration: done?"line-through":"none", transition:"color 0.15s" }}>{chore.name}</span>
                              <span style={{ fontSize:9, color:col.badge, background:`${col.badge}22`, borderRadius:4, padding:"1px 6px", whiteSpace:"nowrap" }}>{chore.freq}</span>
                              <span style={{ fontSize:9, color:"#6b7a8d", whiteSpace:"nowrap" }}>{chore.time} min</span>
                            </div>
                            <div style={{ marginTop:3, fontSize:11, color: done?"#4a5568":"#8a9bb5", lineHeight:1.5 }}>{chore.desc}</div>
                            {done && state.completed[chore.id] && (
                              <div style={{ fontSize:10, color:"#4a6741", marginTop:2 }}>
                                Done at {new Date(state.completed[chore.id]).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
                              </div>
                            )}
                          </div>
                        </div>

                        {/* Chain button */}
                        {chore.chain && (
                          <div style={{ padding:"0 16px 11px 50px" }}>
                            <button
                              className="chain-btn"
                              onClick={e => { e.stopPropagation(); jumpToChore(chore.chain); }}
                              style={{
                                display:"inline-flex", alignItems:"center", gap:6,
                                background:"rgba(230,126,34,0.11)",
                                border:"1px solid rgba(230,126,34,0.28)",
                                borderRadius:6, padding:"4px 12px",
                                color:"#e8a87c", fontSize:11, cursor:"pointer",
                              }}
                            >
                              <span style={{ fontSize:11, opacity:0.9 }}>&#x26D3;</span>
                              {chore.chainLabel} &rarr;
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center", padding:"0 0 30px", fontSize:10, color:"#4a5568", letterSpacing:1 }}>
        TAP ANY CHORE TO MARK COMPLETE &middot; RESET DAILY
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- SERVICE WORKER — inline blob so the file stays self-contained on Netlify -->
<script>
(function () {
  if (!("serviceWorker" in navigator)) return;

  var SW = [
    'const CACHE = "homehq-v2";',
    'const ASSETS = [',
    '  "/",',
    '  "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",',
    '  "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",',
    '  "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"',
    '];',
    'self.addEventListener("install", e => {',
    '  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));',
    '});',
    'self.addEventListener("activate", e => {',
    '  e.waitUntil(caches.keys().then(keys =>',
    '    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))',
    '  ).then(() => self.clients.claim()));',
    '});',
    'self.addEventListener("fetch", e => {',
    '  e.respondWith(',
    '    caches.match(e.request).then(hit => {',
    '      if (hit) return hit;',
    '      return fetch(e.request).then(res => {',
    '        if (!res || res.status !== 200 || res.type === "opaque") return res;',
    '        var clone = res.clone();',
    '        caches.open(CACHE).then(c => c.put(e.request, clone));',
    '        return res;',
    '      }).catch(() => caches.match("/"));',
    '    })',
    '  );',
    '});'
  ].join("\n");

  var blob = new Blob([SW], { type: "text/javascript" });
  var url  = URL.createObjectURL(blob);

  navigator.serviceWorker.register(url, { scope: "/" })
    .then(function (reg) {
      console.log("[HomeHQ] SW registered:", reg.scope);
      URL.revokeObjectURL(url);
    })
    .catch(function (err) {
      console.warn("[HomeHQ] SW failed:", err);
    });
})();
</script>
