<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Guitar Chords</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #111118;
      --surface:      #1c1c28;
      --surface2:     #242435;
      --accent:       #f0a030;
      --accent-dark:  #c07818;
      --text:         #f0ead6;
      --muted:        #706860;
      --chord-bg:     #182040;
      --chord-border: #2a3f70;
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      overflow: hidden;
    }

    /* ── Header ── */
    h1 {
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Key display ── */
    .key-row {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      flex-shrink: 0;
      min-height: 1.4em;
    }
    .key-row strong {
      color: var(--accent);
      font-size: 1.05rem;
    }

    /* ── Chord boxes ── */
    .chords {
      display: flex;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .chord {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--chord-bg);
      border: 1.5px solid var(--chord-border);
      border-radius: 12px;
      padding: 6px 4px;
      gap: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .chord:active {
      background: #203060;
      border-color: var(--accent);
    }

    .chord-num {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .chord-name {
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    /* ── Pentatonic panel ── */
    .pent {
      background: var(--surface);
      border-radius: 10px;
      padding: 8px 10px;
      flex-shrink: 0;
    }

    .pent-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .pent-items {
      display: flex;
      gap: 8px;
    }

    .pent-item {
      flex: 1;
      background: var(--surface2);
      border-radius: 8px;
      padding: 7px 6px;
      text-align: center;
    }

    .pent-fret {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .pent-open {
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      padding-top: 6px;
    }

    .pent-note {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    .pent-desc {
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Generate button ── */
    .btn {
      padding: 15px;
      background: var(--accent);
      color: #1a0e00;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .btn:active { background: var(--accent-dark); }

    /* ── Difficulty selector ── */
    .diff-row {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: 10px;
      padding: 3px;
      flex-shrink: 0;
    }

    .diff-btn {
      flex: 1;
      padding: 7px 4px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .diff-btn.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── Chord modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--chord-border);
      border-radius: 18px;
      padding: 20px 22px 16px;
      text-align: center;
      min-width: 170px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .modal-chord-name {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 14px;
    }

    .modal-diagram {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 14px;
      min-height: 1em;
    }

    .modal-close {
      padding: 8px 22px;
      background: transparent;
      color: var(--muted);
      border: 1px solid #3a3a4a;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .modal-alt-btn {
      padding: 8px 14px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-dark);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-alt-btn:active { background: #2a1800; }

    /* ── Placeholder shown before first generate ── */
    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>GUITAR CHORDS</h1>

<div class="diff-row">
  <button class="diff-btn active" id="diff-1" onclick="setDiff(1)">All Keys</button>
  <button class="diff-btn"        id="diff-2" onclick="setDiff(2)">No ♯♭</button>
  <button class="diff-btn"        id="diff-3" onclick="setDiff(3)">Open Chords</button>
</div>

<div class="key-row" id="key-row"></div>

<div id="placeholder" class="placeholder">Tap Generate for a chord progression</div>
<div class="chords" id="chords" style="display:none"></div>

<div class="pent" id="pent" style="display:none">
  <div class="pent-title">Pentatonic Improv &nbsp;·&nbsp; low E string root</div>
  <div class="pent-items" id="pent-items"></div>
</div>

<button class="btn" onclick="generate()">&#127928; Generate</button>

<!-- Chord diagram modal -->
<div id="modal" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="modal-name" class="modal-chord-name"></div>
    <div id="modal-diagram" class="modal-diagram"></div>
    <div id="modal-desc" class="modal-desc"></div>
    <div class="modal-actions">
      <button id="modal-alt-btn" class="modal-alt-btn" onclick="nextVariant()">Alt Voicing →</button>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Music theory ──────────────────────────────────────────────────────────────

// Chromatic notes (internal representation uses sharps throughout)
const NOTES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Display names prefer flats where guitarists expect them (Bb, Eb, Ab)
const DISPLAY = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// Low E string fret for a note index: E is open (0), everything follows chromatically
// fret = (noteIndex - NOTES.indexOf('E') + 12) % 12 = (noteIndex - 4 + 12) % 12
function fretOf(noteIdx) { return (noteIdx - 4 + 12) % 12; }

// Scale intervals
const MAJ_IVLS = [0, 2, 4, 5, 7, 9, 11];
const MIN_IVLS = [0, 2, 3, 5, 7, 8, 10];

// Diatonic chord quality at each scale degree
const MAJ_QUAL = ['maj','min','min','maj','maj','min','dim'];
const MIN_QUAL = ['min','dim','maj','min','min','maj','maj'];

// Roman numerals for display
const MAJ_NUMS = ['I','ii','iii','IV','V','vi','vii°'];
const MIN_NUMS = ['i','ii°','III','iv','v','VI','VII'];

// Build all 7 diatonic chords for a key
function buildKey(rootIdx, mode) {
  const ivls  = mode === 'major' ? MAJ_IVLS : MIN_IVLS;
  const quals = mode === 'major' ? MAJ_QUAL : MIN_QUAL;
  const nums  = mode === 'major' ? MAJ_NUMS : MIN_NUMS;
  return ivls.map((iv, i) => {
    const ni = (rootIdx + iv) % 12;
    return { noteIdx: ni, display: DISPLAY[ni], quality: quals[i], numeral: nums[i] };
  });
}

// Format a chord name for display: "G", "Em", "B°"
function chordName(display, quality) {
  if (quality === 'min') return display + 'm';
  if (quality === 'dim') return display + '°';
  return display;
}

// Pentatonic positions: returns two { fret, note, desc } objects
function pentInfo(rootIdx, mode) {
  const rootDisp = DISPLAY[rootIdx];
  const rootFret = fretOf(rootIdx);

  if (mode === 'major') {
    // Relative minor = 6th degree = root + 9 semitones
    const relIdx  = (rootIdx + 9) % 12;
    const relDisp = DISPLAY[relIdx];
    return [
      { fret: rootFret, note: rootDisp,        desc: 'Major pentatonic' },
      { fret: fretOf(relIdx), note: relDisp + 'm', desc: 'Minor pent (relative)' },
    ];
  } else {
    // Relative major = 3rd degree = root + 3 semitones
    const relIdx  = (rootIdx + 3) % 12;
    const relDisp = DISPLAY[relIdx];
    return [
      { fret: rootFret,       note: rootDisp + 'm', desc: 'Minor pentatonic' },
      { fret: fretOf(relIdx), note: relDisp,         desc: 'Major pent (relative)' },
    ];
  }
}

// ── Chord diagram data ────────────────────────────────────────────────────────
// Each chord is an array of voicing variants: { f:[lowE,A,D,G,B,highE], b:baseFret, t:label }
// Fret values: -1=mute  0=open  N=absolute fret number
const CHORD_DATA = {
  // ── Major ──────────────────────────────────────────────────────────────────
  'C':  [ { f:[-1,3,2,0,1,0],    b:1, t:'Open'              },
          { f:[-1,3,5,5,5,3],    b:3, t:'Barre · Fret 3'    },
          { f:[0,3,2,0,1,0],     b:1, t:'C/E — 1st inv.'    } ],
  'C#': [ { f:[-1,4,6,6,6,4],    b:4, t:'Barre · Fret 4'    },
          { f:[9,11,11,10,9,9],  b:9, t:'Barre · Fret 9'    } ],
  'D':  [ { f:[-1,-1,0,2,3,2],   b:1, t:'Open'              },
          { f:[-1,5,7,7,7,5],    b:5, t:'Barre · Fret 5'    },
          { f:[2,-1,0,2,3,2],    b:1, t:'D/F# — 1st inv.'   } ],
  'Eb': [ { f:[-1,-1,1,3,4,3],   b:1, t:'Open voicing'      },
          { f:[-1,6,8,8,8,6],    b:6, t:'Barre · Fret 6'    } ],
  'E':  [ { f:[0,2,2,1,0,0],     b:1, t:'Open'              },
          { f:[-1,7,9,9,9,7],    b:7, t:'Barre · Fret 7'    },
          { f:[4,2,2,1,0,0],     b:1, t:'E/G# — 1st inv.'   } ],
  'F':  [ { f:[1,3,3,2,1,1],     b:1, t:'Barre · Fret 1'    },   // 133211
          { f:[-1,-1,3,2,1,1],   b:1, t:'Simplified (top 4)' },
          { f:[-1,0,3,2,1,1],    b:1, t:'F/A — 1st inv.'    } ],
  'F#': [ { f:[2,4,4,3,2,2],     b:2, t:'Barre · Fret 2'    },
          { f:[-1,9,11,11,11,9], b:9, t:'Barre · Fret 9'    } ],
  'G':  [ { f:[3,2,0,0,0,3],     b:1, t:'Open'              },
          { f:[3,2,0,0,3,3],     b:1, t:'Open (full voicing)' },
          { f:[-1,2,0,0,0,3],    b:1, t:'G/B — 1st inv.'    },
          { f:[-1,-1,0,0,3,3],   b:1, t:'G/D — 2nd inv.'    } ],
  'Ab': [ { f:[4,6,6,5,4,4],     b:4, t:'Barre · Fret 4'    },
          { f:[-1,-1,6,5,4,4],   b:4, t:'Barre · Fret 4 (top 4)' } ],
  'A':  [ { f:[-1,0,2,2,2,0],    b:1, t:'Open'              },
          { f:[5,7,7,6,5,5],     b:5, t:'Barre · Fret 5'    },
          { f:[-1,4,2,2,2,0],    b:1, t:'A/C# — 1st inv.'   } ],
  'Bb': [ { f:[-1,1,3,3,3,1],    b:1, t:'Barre · Fret 1'    },
          { f:[6,8,8,7,6,6],     b:6, t:'Barre · Fret 6'    } ],
  'B':  [ { f:[-1,2,4,4,4,2],    b:2, t:'Barre · Fret 2'    },
          { f:[7,9,9,8,7,7],     b:7, t:'Barre · Fret 7'    } ],
  // ── Minor ──────────────────────────────────────────────────────────────────
  'Cm':  [ { f:[-1,3,5,5,4,3],   b:3, t:'Barre · Fret 3'    },
           { f:[8,10,10,8,8,8],  b:8, t:'Barre · Fret 8'    } ],
  'C#m': [ { f:[-1,4,6,6,5,4],   b:4, t:'Barre · Fret 4'    },
           { f:[9,11,11,9,9,9],  b:9, t:'Barre · Fret 9'    } ],
  'Dm':  [ { f:[-1,-1,0,2,3,1],  b:1, t:'Open'              },
           { f:[-1,5,7,7,6,5],   b:5, t:'Barre · Fret 5'    },
           { f:[-1,-1,3,2,3,1],  b:1, t:'Dm/F — 1st inv.'   } ],
  'Ebm': [ { f:[-1,-1,1,3,4,2],  b:1, t:'Open voicing'      },
           { f:[-1,6,8,8,7,6],   b:6, t:'Barre · Fret 6'    } ],
  'Em':  [ { f:[0,2,2,0,0,0],    b:1, t:'Open'              },
           { f:[-1,7,9,9,8,7],   b:7, t:'Barre · Fret 7'    },
           { f:[-1,2,2,0,0,0],   b:1, t:'Em/B — 1st inv.'   } ],
  'Fm':  [ { f:[1,3,3,1,1,1],    b:1, t:'Barre · Fret 1'    },
           { f:[-1,8,10,10,9,8], b:8, t:'Barre · Fret 8'    } ],
  'F#m': [ { f:[2,4,4,2,2,2],    b:2, t:'Barre · Fret 2'    },
           { f:[-1,9,11,11,10,9],b:9, t:'Barre · Fret 9'    } ],
  'Gm':  [ { f:[3,5,5,3,3,3],    b:3, t:'Barre · Fret 3'    },
           { f:[-1,10,12,12,11,10],b:10,t:'Barre · Fret 10'  } ],
  'Abm': [ { f:[4,6,6,4,4,4],    b:4, t:'Barre · Fret 4'    },
           { f:[-1,-1,6,4,4,4],  b:4, t:'Barre · Fret 4 (top 4)' } ],
  'Am':  [ { f:[-1,0,2,2,1,0],   b:1, t:'Open'              },
           { f:[5,7,7,5,5,5],    b:5, t:'Barre · Fret 5'    },
           { f:[-1,3,2,2,1,0],   b:1, t:'Am/C — 1st inv.'   },
           { f:[0,0,2,2,1,0],    b:1, t:'Am/E — 2nd inv.'   } ],
  'Bbm': [ { f:[-1,1,3,3,2,1],   b:1, t:'Barre · Fret 1'    },
           { f:[6,8,8,6,6,6],    b:6, t:'Barre · Fret 6'    } ],
  'Bm':  [ { f:[-1,2,4,4,3,2],   b:2, t:'Barre · Fret 2'    },
           { f:[7,9,9,7,7,7],    b:7, t:'Barre · Fret 7'    } ],
};

// ── SVG chord diagram renderer ────────────────────────────────────────────────
function chordDiagramSVG(frets, base) {
  if (!frets) return '<p style="color:#666;font-size:.8rem;padding:8px">No diagram</p>';

  const SG=19, FG=21, ML=13, MT=22, NF=4;
  const MR = base > 1 ? 26 : 8;
  const W = ML + 5*SG + MR, H = MT + NF*FG + 8;

  const sx = s => ML + s*SG;
  const fy = f => MT + f*FG;
  let o = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  // String lines
  for (let s=0; s<6; s++)
    o += `<line x1="${sx(s)}" y1="${fy(0)}" x2="${sx(s)}" y2="${fy(NF)}" stroke="#4a4a5a" stroke-width="1.5"/>`;

  // Fret/nut lines
  for (let n=0; n<=NF; n++) {
    const isNut = n===0 && base===1;
    o += `<line x1="${sx(0)}" y1="${fy(n)}" x2="${sx(5)}" y2="${fy(n)}" stroke="${isNut?'#c0bdb0':'#38384a'}" stroke-width="${isNut?4:1}"/>`;
  }

  // Fret number label when not at nut
  if (base > 1)
    o += `<text x="${W-MR+4}" y="${fy(0.5)}" font-size="11" fill="#aaa" dominant-baseline="middle">${base}fr</text>`;

  // Open/muted indicators above nut
  for (let s=0; s<6; s++) {
    const x=sx(s), y=MT-11, v=frets[s];
    if (v===-1) o += `<text x="${x}" y="${y}" font-size="12" fill="#555" text-anchor="middle" dominant-baseline="middle">✕</text>`;
    else if (v===0) o += `<circle cx="${x}" cy="${y}" r="4.5" fill="none" stroke="#888" stroke-width="1.5"/>`;
  }

  // Group fretted strings by relative fret position
  const groups = {};
  for (let s=0; s<6; s++) {
    if (frets[s] > 0) {
      const rel = frets[s] - base + 1;
      if (rel >= 1 && rel <= NF) (groups[rel] = groups[rel]||[]).push(s);
    }
  }

  // Draw barre (pill) only when all strings in the span are fretted (no muted/open gaps)
  function hasGapInRange(minS, maxS) {
    for (let s = minS + 1; s < maxS; s++) {
      if (frets[s] <= 0) return true;
    }
    return false;
  }

  for (const [rel, strings] of Object.entries(groups)) {
    const y = fy(Number(rel) - 0.5);
    const pr = FG * 0.37;
    const sorted = [...strings].sort((a,b) => a-b);
    const minS = sorted[0], maxS = sorted[sorted.length-1];
    const drawBar = strings.length >= 2 && !hasGapInRange(minS, maxS);
    if (drawBar) {
      const x1=sx(minS), x2=sx(maxS);
      o += `<rect x="${x1-pr}" y="${y-pr}" width="${x2-x1+2*pr}" height="${2*pr}" rx="${pr}" fill="#e8e0d0"/>`;
    } else {
      for (const s of sorted) {
        o += `<circle cx="${sx(s)}" cy="${y}" r="${pr}" fill="#e8e0d0"/>`;
      }
    }
  }

  o += '</svg>';
  return o;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let modalChord = null, modalVariant = 0;

function renderModalDiagram() {
  const variants = CHORD_DATA[modalChord];
  const v = variants ? variants[modalVariant] : null;
  document.getElementById('modal-diagram').innerHTML =
    v ? chordDiagramSVG(v.f, v.b) : '<p style="color:#666;font-size:.8rem;padding:8px">No diagram</p>';
  const total = variants ? variants.length : 0;
  document.getElementById('modal-desc').textContent =
    v ? (total > 1 ? `${v.t}  ·  ${modalVariant + 1} / ${total}` : v.t) : '';
  document.getElementById('modal-alt-btn').style.display =
    total > 1 ? 'inline-block' : 'none';
}

function nextVariant() {
  const variants = CHORD_DATA[modalChord];
  if (!variants || variants.length <= 1) return;
  modalVariant = (modalVariant + 1) % variants.length;
  renderModalDiagram();
}

function showChordModal(display, quality) {
  modalChord   = quality === 'min' ? display + 'm' : display;
  modalVariant = 0;
  document.getElementById('modal-name').textContent = chordName(display, quality);
  renderModalDiagram();
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// ── Progressions (degree indices into the 7-chord diatonic scale) ─────────────

// Each entry: array of 4 degree indices (0-based)
const MAJ_PROGS = [
  [0, 4, 5, 3],  // I  – V  – vi – IV   (pop axis)
  [0, 5, 3, 4],  // I  – vi – IV – V    (50s)
  [0, 3, 4, 3],  // I  – IV – V  – IV
  [5, 3, 0, 4],  // vi – IV – I  – V
  [0, 2, 3, 4],  // I  – iii– IV – V
  [0, 3, 5, 4],  // I  – IV – vi – V
  [0, 4, 3, 4],  // I  – V  – IV – V    (blues turnaround feel)
  [1, 4, 0, 3],  // ii – V  – I  – IV   (jazz-flavoured)
  [0, 3, 4, 5],  // I  – IV – V  – vi
  [0, 5, 3, 0],  // I  – vi – IV – I
  [0, 5, 1, 4],  // I  – vi – ii – V    (jazz turnaround; C: C-Am-Dm-G)
  [0, 1, 4, 5],  // I  – ii – V  – vi   (C: C-Dm-G-Am)
];

const MIN_PROGS = [
  [0, 6, 5, 6],  // i   – VII – VI  – VII  (Andalusian)
  [0, 5, 2, 6],  // i   – VI  – III – VII
  [0, 3, 6, 2],  // i   – iv  – VII – III
  [0, 4, 5, 6],  // i   – v   – VI  – VII
  [0, 5, 6, 0],  // i   – VI  – VII – i
  [0, 2, 6, 5],  // i   – III – VII – VI
  [0, 3, 4, 0],  // i   – iv  – v   – i
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Difficulty filtering ──────────────────────────────────────────────────────
// 1 = All Keys   2 = Natural notes only   3 = Open chords only

const NATURAL_NOTES = new Set([0, 2, 4, 5, 7, 9, 11]); // C D E F G A B
const OPEN_MAJOR    = new Set([0, 2, 4, 7, 9]);          // C D E G A (open major shapes)
const OPEN_MINOR    = new Set([2, 4, 9]);                 // Dm Em Am  (open minor shapes)

function chordOk(noteIdx, quality, diff) {
  if (diff === 1) return true;
  if (diff === 2) return NATURAL_NOTES.has(noteIdx);
  // diff 3: open chord shapes only; dim chords excluded
  if (quality === 'maj') return OPEN_MAJOR.has(noteIdx);
  if (quality === 'min') return OPEN_MINOR.has(noteIdx);
  return false;
}

let difficulty = 1;

function setDiff(d) {
  difficulty = d;
  [1, 2, 3].forEach(i =>
    document.getElementById('diff-' + i).classList.toggle('active', i === d)
  );
}

// ── Main generator ────────────────────────────────────────────────────────────

function generate() {
  // Collect all (rootIdx, mode, filteredProgs) combos valid for current difficulty
  const options = [];
  for (let r = 0; r < 12; r++) {
    for (const mode of ['major', 'minor']) {
      const key = buildKey(r, mode);
      const pool = (mode === 'major' ? MAJ_PROGS : MIN_PROGS).filter(prog =>
        prog.every(deg => chordOk(key[deg].noteIdx, key[deg].quality, difficulty))
      );
      if (pool.length) options.push({ rootIdx: r, mode, pool, key });
    }
  }

  const opt  = pick(options);
  const prog = pick(opt.pool);
  const key  = opt.key;
  const { rootIdx, mode } = opt;

  // Render key label
  const keyName = DISPLAY[rootIdx] + (mode === 'major' ? ' Major' : ' Minor');
  document.getElementById('key-row').innerHTML = 'Key: <strong>' + keyName + '</strong>';

  // Render chord boxes
  const chordsEl = document.getElementById('chords');
  chordsEl.innerHTML = '';
  prog.forEach(deg => {
    const c   = key[deg];
    const box = document.createElement('div');
    box.className = 'chord';
    box.innerHTML =
      '<div class="chord-num">' + c.numeral + '</div>' +
      '<div class="chord-name">' + chordName(c.display, c.quality) + '</div>';
    box.addEventListener('click', () => showChordModal(c.display, c.quality));
    chordsEl.appendChild(box);
  });

  // Render pentatonic panel
  const pents   = pentInfo(rootIdx, mode);
  const pentEl  = document.getElementById('pent-items');
  pentEl.innerHTML = '';
  pents.forEach(p => {
    const item = document.createElement('div');
    item.className = 'pent-item';
    const fretHTML = p.fret === 0
      ? '<div class="pent-open">Open</div>'
      : '<div class="pent-fret">' + p.fret + '</div>';
    item.innerHTML =
      fretHTML +
      '<div class="pent-note">' + p.note + '</div>' +
      '<div class="pent-desc">' + p.desc + '</div>';
    pentEl.appendChild(item);
  });

  // Show result, hide placeholder
  document.getElementById('placeholder').style.display = 'none';
  chordsEl.style.display    = 'flex';
  document.getElementById('pent').style.display = 'block';
}
</script>
